# zoom-mcp unified Workflow configuration
#
# A single YAML drives both the first-run setup HTTP flow and the steady-state
# MCP tool server. The http.server on :8765 serves the setup UI and the OAuth
# callback; the mcp.server (plus stdio and streamable-HTTP transports) exposes
# the Zoom API as MCP tools.

modules:
  - name: zoom-secrets
    type: secrets.keychain
    config:
      service: zoom-mcp

  - name: zoom-client
    type: http.client
    config:
      base_url: "https://api.zoom.us/v2"
      timeout: 30s
      auth:
        type: oauth2_refresh_token
        token_url: "https://zoom.us/oauth/token"
        client_id_from_secret: { provider: zoom-secrets, key: client_id }
        client_secret_from_secret: { provider: zoom-secrets, key: client_secret }
        token_secrets: zoom-secrets
        token_secrets_key: oauth_token

  # Separate client for Zoom recording/transcript downloads. Zoom signs these
  # URLs with a query-param access_token instead of an Authorization header,
  # so the client must not attach OAuth credentials.
  - name: zoom-download-client
    type: http.client
    config:
      timeout: 60s
      auth:
        type: none

  - name: mcp-tool-registry
    type: mcp.tool_registry

  - name: mcp-server
    type: mcp.server
    config:
      implementation:
        name: zoom-mcp
        version: "0.1.0"
      registry: mcp-tool-registry

  - name: mcp-stdio
    type: mcp.stdio_transport
    config:
      server: mcp-server

  - name: mcp-http
    type: mcp.http_transport
    config:
      server: mcp-server
      address: "127.0.0.1:7823"

  - name: http-server
    type: http.server
    config:
      address: "127.0.0.1:8765"

  - name: http-router
    type: http.router
    dependsOn: [http-server]

workflows:
  http:
    router: http-router
    server: http-server
    routes: []

pipelines:
  # --- Setup flow ---------------------------------------------------------
  #
  # Browser submits the form as JSON (the http trigger only parses JSON
  # bodies), so setup-save returns the Zoom OAuth URL as JSON and the page
  # redirects itself. OAuth callback is a normal GET — Zoom sends the `code`
  # as a query param, which the http trigger exposes at .trigger.code.

  setup-form:
    trigger:
      type: http
      config:
        method: GET
        path: /setup
    steps:
      - type: step.raw_response
        config:
          content_type: "text/html; charset=utf-8"
          body: |
            <!doctype html><html><body style="font-family:system-ui; max-width:480px; margin:2em auto;">
              <h1>Zoom MCP — Setup</h1>
              <p>Register <code>http://127.0.0.1:8765/oauth/callback</code> as a redirect URI
                 in your <a href="https://marketplace.zoom.us/user/build" target="_blank">Zoom OAuth app</a>.</p>
              <form id="setup-form">
                <label>Client ID<br><input name="client_id" required style="width:100%"/></label><br><br>
                <label>Client Secret<br><input name="client_secret" type="password" required style="width:100%"/></label><br><br>
                <button type="submit">Authorize with Zoom →</button>
              </form>
              <script>
                document.getElementById('setup-form').addEventListener('submit', async (e) => {
                  e.preventDefault();
                  const body = {
                    client_id: e.target.client_id.value,
                    client_secret: e.target.client_secret.value,
                  };
                  const res = await fetch('/setup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                  });
                  const data = await res.json();
                  if (data.redirect_url) {
                    window.location = data.redirect_url;
                  } else {
                    document.body.insertAdjacentHTML('beforeend',
                      '<p style="color:red">Error: ' + (data.error || 'unknown') + '</p>');
                  }
                });
              </script>
            </body></html>

  setup-save:
    trigger:
      type: http
      config:
        method: POST
        path: /setup
    steps:
      - type: step.secret_set
        config:
          module: zoom-secrets
          secrets:
            client_id: '{{ .trigger.body.client_id }}'
            client_secret: '{{ .trigger.body.client_secret }}'
      - type: step.json_response
        config:
          status: 200
          body:
            redirect_url: >
              https://zoom.us/oauth/authorize?response_type=code&client_id={{
              urlEncode .trigger.body.client_id }}&redirect_uri={{
              urlEncode "http://127.0.0.1:8765/oauth/callback" }}&state={{
              uuid }}&scope=user:read:user+meeting:read:list_meetings+meeting:read:meeting+meeting:read:past_meeting+meeting:read:list_past_instances+meeting:read:list_past_participants+meeting:read:summary+meeting:read:list_summaries+cloud_recording:read:list_user_recordings+cloud_recording:read:list_recording_files+cloud_recording:read:meeting_transcript+chat:read:list_user_channels+chat:read:user_channel+chat:read:list_user_messages+chat:read:user_message

  oauth-callback:
    trigger:
      type: http
      config:
        method: GET
        path: /oauth/callback
    steps:
      - name: fetch-creds
        type: step.secret_fetch
        config:
          module: zoom-secrets
          secrets:
            client_id: client_id
            client_secret: client_secret
      - name: build-token-body
        type: step.set
        config:
          values:
            body: 'grant_type=authorization_code&code={{ urlEncode .trigger.code }}&redirect_uri={{ urlEncode "http://127.0.0.1:8765/oauth/callback" }}'
      - name: token-exchange
        type: step.http_call
        config:
          url: "https://zoom.us/oauth/token"
          method: POST
          headers:
            Content-Type: "application/x-www-form-urlencoded"
            Authorization: 'Basic {{ b64 (printf "%s:%s" (step "fetch-creds" "client_id") (step "fetch-creds" "client_secret")) }}'
          body_from: "steps.build-token-body.body"
      - type: step.secret_set
        config:
          module: zoom-secrets
          secrets:
            oauth_token: '{{ json (step "token-exchange" "body") }}'
      - type: step.raw_response
        config:
          content_type: "text/html; charset=utf-8"
          body: |
            <!doctype html><html><body style="font-family:system-ui; text-align:center; margin-top:4em;">
              <h1>✓ Authorized</h1><p>You can close this tab.</p>
            </body></html>

  # --- MCP tool pipelines -------------------------------------------------
  #
  # Each pipeline registers one MCP tool via the `mcp.tool` trigger.
  # Pattern: step.http_call → step.jq → step.pipeline_output.
  #
  # `error_on_status: false` on each http_call lets the jq step inspect the
  # response and produce the unified success/error shape defined by the
  # tool's output schema:
  #   success: { ok: true,  data:  <tool-specific payload> }
  #   error:   { ok: false, error: { code, message, retry_after? } }
  #
  # Status-code mapping (applied in every error branch):
  #   401 → not_authenticated  (token missing/invalid — re-run setup)
  #   403 → scope_missing      (OAuth app missing a required scope)
  #   404 → not_found          (resource not found; overridden per-tool where needed)
  #   429 → rate_limited       (includes retry_after from Retry-After header)
  #   else → zoom_error        (generic passthrough of Zoom's error message)
  #
  # Paginated tools use `step.while` with `iteration_var: iter` so the first
  # iteration runs unconditionally and subsequent iterations run only while
  # the last call succeeded (2xx) and returned a non-empty next_page_token.

  get_me:
    trigger:
      type: mcp.tool
      config:
        server: mcp-server
        registry: mcp-tool-registry
        name: get_me
        description: "Get the authenticated user's Zoom profile (id, email, name, type)."
        input_schema:
          type: object
          properties: {}
    steps:
      - name: call
        type: step.http_call
        config:
          client: zoom-client
          url: "/users/me"
          method: GET
          error_on_status: false
      - name: shape
        type: step.jq
        config:
          input_from: steps.call
          expression: |
            if .status_code < 400 then {ok: true, data: .body}
            elif .status_code == 401 then {ok: false, error: {code: "not_authenticated", message: "Zoom OAuth token is missing or invalid; run setup flow."}}
            elif .status_code == 403 then {ok: false, error: {code: "scope_missing", message: (.body.message // "required OAuth scope is missing")}}
            elif .status_code == 404 then {ok: false, error: {code: "not_found", message: (.body.message // "resource not found")}}
            elif .status_code == 429 then {ok: false, error: {code: "rate_limited", message: "Zoom rate limit exceeded", retry_after: ((.headers["Retry-After"] // "60") | tonumber)}}
            else {ok: false, error: {code: "zoom_error", message: (.body.message // ("HTTP " + (.status_code | tostring)))}}
            end
      - type: step.pipeline_output
        config:
          source: steps.shape.result

  list_meetings:
    trigger:
      type: mcp.tool
      config:
        server: mcp-server
        registry: mcp-tool-registry
        name: list_meetings
        description: "List the authenticated user's meetings across all pages."
        input_schema:
          type: object
          properties:
            type:
              type: string
              enum: [scheduled, live, upcoming, upcoming_meetings, previous_meetings]
              default: upcoming
              description: "Which set of meetings to return. Defaults to 'upcoming'."
    steps:
      - name: paginate
        type: step.while
        config:
          condition: |
            {{- if .iter.first -}}yes{{- else if and (lt (toInt .steps.call.status_code) 400) .steps.call.body.next_page_token -}}yes{{- end -}}
          max_iterations: 100
          iteration_var: iter
          accumulate:
            key: meetings
            from: "{{.steps.call.body.meetings}}"
          steps:
            - name: call
              type: step.http_call
              config:
                client: zoom-client
                url: '/users/me/meetings?page_size=100&type={{ default "upcoming" .input.type }}{{ if .steps.call.body.next_page_token }}&next_page_token={{ urlEncode .steps.call.body.next_page_token }}{{ end }}'
                method: GET
                error_on_status: false
      - name: shape
        type: step.jq
        config:
          input_from: steps
          expression: |
            (.call // {}) as $r |
            if ($r.status_code // 0) < 400 then {ok: true, data: {meetings: (.paginate.meetings // [])}}
            elif $r.status_code == 401 then {ok: false, error: {code: "not_authenticated", message: "Zoom OAuth token is missing or invalid; run setup flow."}}
            elif $r.status_code == 403 then {ok: false, error: {code: "scope_missing", message: ($r.body.message // "required OAuth scope is missing")}}
            elif $r.status_code == 404 then {ok: false, error: {code: "not_found", message: ($r.body.message // "resource not found")}}
            elif $r.status_code == 429 then {ok: false, error: {code: "rate_limited", message: "Zoom rate limit exceeded", retry_after: (($r.headers["Retry-After"] // "60") | tonumber)}}
            else {ok: false, error: {code: "zoom_error", message: ($r.body.message // ("HTTP " + ($r.status_code | tostring)))}}
            end
      - type: step.pipeline_output
        config:
          source: steps.shape.result

  get_meeting:
    trigger:
      type: mcp.tool
      config:
        server: mcp-server
        registry: mcp-tool-registry
        name: get_meeting
        description: "Get a single meeting's details by meeting ID."
        input_schema:
          type: object
          properties:
            meetingId: { type: string, description: "The meeting ID." }
          required: [meetingId]
    steps:
      - name: call
        type: step.http_call
        config:
          client: zoom-client
          url: "/meetings/{{ .input.meetingId }}"
          method: GET
          error_on_status: false
      - name: shape
        type: step.jq
        config:
          input_from: steps.call
          expression: |
            if .status_code < 400 then {ok: true, data: .body}
            elif .status_code == 401 then {ok: false, error: {code: "not_authenticated", message: "Zoom OAuth token is missing or invalid; run setup flow."}}
            elif .status_code == 403 then {ok: false, error: {code: "scope_missing", message: (.body.message // "required OAuth scope is missing")}}
            elif .status_code == 404 then {ok: false, error: {code: "not_found", message: (.body.message // "meeting not found")}}
            elif .status_code == 429 then {ok: false, error: {code: "rate_limited", message: "Zoom rate limit exceeded", retry_after: ((.headers["Retry-After"] // "60") | tonumber)}}
            else {ok: false, error: {code: "zoom_error", message: (.body.message // ("HTTP " + (.status_code | tostring)))}}
            end
      - type: step.pipeline_output
        config:
          source: steps.shape.result

  get_past_meeting:
    trigger:
      type: mcp.tool
      config:
        server: mcp-server
        registry: mcp-tool-registry
        name: get_past_meeting
        description: "Get details of a past meeting by meeting ID or UUID."
        input_schema:
          type: object
          properties:
            meetingId: { type: string, description: "The past meeting ID or UUID." }
          required: [meetingId]
    steps:
      - name: call
        type: step.http_call
        config:
          client: zoom-client
          url: "/past_meetings/{{ .input.meetingId }}"
          method: GET
          error_on_status: false
      - name: shape
        type: step.jq
        config:
          input_from: steps.call
          expression: |
            if .status_code < 400 then {ok: true, data: .body}
            elif .status_code == 401 then {ok: false, error: {code: "not_authenticated", message: "Zoom OAuth token is missing or invalid; run setup flow."}}
            elif .status_code == 403 then {ok: false, error: {code: "scope_missing", message: (.body.message // "required OAuth scope is missing")}}
            elif .status_code == 404 then {ok: false, error: {code: "not_found", message: (.body.message // "past meeting not found")}}
            elif .status_code == 429 then {ok: false, error: {code: "rate_limited", message: "Zoom rate limit exceeded", retry_after: ((.headers["Retry-After"] // "60") | tonumber)}}
            else {ok: false, error: {code: "zoom_error", message: (.body.message // ("HTTP " + (.status_code | tostring)))}}
            end
      - type: step.pipeline_output
        config:
          source: steps.shape.result

  list_past_meeting_instances:
    trigger:
      type: mcp.tool
      config:
        server: mcp-server
        registry: mcp-tool-registry
        name: list_past_meeting_instances
        description: "List past occurrences (instances) of a recurring meeting."
        input_schema:
          type: object
          properties:
            meetingId: { type: string, description: "The meeting ID." }
          required: [meetingId]
    steps:
      - name: call
        type: step.http_call
        config:
          client: zoom-client
          url: "/past_meetings/{{ .input.meetingId }}/instances"
          method: GET
          error_on_status: false
      - name: shape
        type: step.jq
        config:
          input_from: steps.call
          expression: |
            if .status_code < 400 then {ok: true, data: .body}
            elif .status_code == 401 then {ok: false, error: {code: "not_authenticated", message: "Zoom OAuth token is missing or invalid; run setup flow."}}
            elif .status_code == 403 then {ok: false, error: {code: "scope_missing", message: (.body.message // "required OAuth scope is missing")}}
            elif .status_code == 404 then {ok: false, error: {code: "not_found", message: (.body.message // "meeting not found")}}
            elif .status_code == 429 then {ok: false, error: {code: "rate_limited", message: "Zoom rate limit exceeded", retry_after: ((.headers["Retry-After"] // "60") | tonumber)}}
            else {ok: false, error: {code: "zoom_error", message: (.body.message // ("HTTP " + (.status_code | tostring)))}}
            end
      - type: step.pipeline_output
        config:
          source: steps.shape.result

  list_past_meeting_participants:
    trigger:
      type: mcp.tool
      config:
        server: mcp-server
        registry: mcp-tool-registry
        name: list_past_meeting_participants
        description: "List participants of a past meeting (paginated across all pages)."
        input_schema:
          type: object
          properties:
            meetingId: { type: string, description: "The past meeting ID or UUID." }
          required: [meetingId]
    steps:
      - name: paginate
        type: step.while
        config:
          condition: |
            {{- if .iter.first -}}yes{{- else if and (lt (toInt .steps.call.status_code) 400) .steps.call.body.next_page_token -}}yes{{- end -}}
          max_iterations: 100
          iteration_var: iter
          accumulate:
            key: participants
            from: "{{.steps.call.body.participants}}"
          steps:
            - name: call
              type: step.http_call
              config:
                client: zoom-client
                url: '/past_meetings/{{ .input.meetingId }}/participants?page_size=100{{ if .steps.call.body.next_page_token }}&next_page_token={{ urlEncode .steps.call.body.next_page_token }}{{ end }}'
                method: GET
                error_on_status: false
      - name: shape
        type: step.jq
        config:
          input_from: steps
          expression: |
            (.call // {}) as $r |
            if ($r.status_code // 0) < 400 then {ok: true, data: {participants: (.paginate.participants // [])}}
            elif $r.status_code == 401 then {ok: false, error: {code: "not_authenticated", message: "Zoom OAuth token is missing or invalid; run setup flow."}}
            elif $r.status_code == 403 then {ok: false, error: {code: "scope_missing", message: ($r.body.message // "required OAuth scope is missing")}}
            elif $r.status_code == 404 then {ok: false, error: {code: "not_found", message: ($r.body.message // "meeting not found")}}
            elif $r.status_code == 429 then {ok: false, error: {code: "rate_limited", message: "Zoom rate limit exceeded", retry_after: (($r.headers["Retry-After"] // "60") | tonumber)}}
            else {ok: false, error: {code: "zoom_error", message: ($r.body.message // ("HTTP " + ($r.status_code | tostring)))}}
            end
      - type: step.pipeline_output
        config:
          source: steps.shape.result

  list_recordings:
    trigger:
      type: mcp.tool
      config:
        server: mcp-server
        registry: mcp-tool-registry
        name: list_recordings
        description: "List cloud recordings for the authenticated user (paginated). Optional from/to date range (YYYY-MM-DD)."
        input_schema:
          type: object
          properties:
            from: { type: string, format: date, description: "Start date (YYYY-MM-DD). Defaults to Zoom's server default (~1 month ago)." }
            to:   { type: string, format: date, description: "End date (YYYY-MM-DD). Defaults to today." }
    steps:
      - name: paginate
        type: step.while
        config:
          condition: |
            {{- if .iter.first -}}yes{{- else if and (lt (toInt .steps.call.status_code) 400) .steps.call.body.next_page_token -}}yes{{- end -}}
          max_iterations: 100
          iteration_var: iter
          accumulate:
            key: meetings
            from: "{{.steps.call.body.meetings}}"
          steps:
            - name: call
              type: step.http_call
              config:
                client: zoom-client
                url: '/users/me/recordings?page_size=100{{ if .input.from }}&from={{ urlEncode .input.from }}{{ end }}{{ if .input.to }}&to={{ urlEncode .input.to }}{{ end }}{{ if .steps.call.body.next_page_token }}&next_page_token={{ urlEncode .steps.call.body.next_page_token }}{{ end }}'
                method: GET
                error_on_status: false
      - name: shape
        type: step.jq
        config:
          input_from: steps
          expression: |
            (.call // {}) as $r |
            if ($r.status_code // 0) < 400 then {ok: true, data: {meetings: (.paginate.meetings // [])}}
            elif $r.status_code == 401 then {ok: false, error: {code: "not_authenticated", message: "Zoom OAuth token is missing or invalid; run setup flow."}}
            elif $r.status_code == 403 then {ok: false, error: {code: "scope_missing", message: ($r.body.message // "required OAuth scope is missing")}}
            elif $r.status_code == 404 then {ok: false, error: {code: "not_found", message: ($r.body.message // "recordings not found")}}
            elif $r.status_code == 429 then {ok: false, error: {code: "rate_limited", message: "Zoom rate limit exceeded", retry_after: (($r.headers["Retry-After"] // "60") | tonumber)}}
            else {ok: false, error: {code: "zoom_error", message: ($r.body.message // ("HTTP " + ($r.status_code | tostring)))}}
            end
      - type: step.pipeline_output
        config:
          source: steps.shape.result

  get_meeting_recordings:
    trigger:
      type: mcp.tool
      config:
        server: mcp-server
        registry: mcp-tool-registry
        name: get_meeting_recordings
        description: "Get cloud recordings (video, audio, chat, transcript files) for a specific meeting."
        input_schema:
          type: object
          properties:
            meetingId: { type: string, description: "The meeting ID or UUID." }
          required: [meetingId]
    steps:
      - name: call
        type: step.http_call
        config:
          client: zoom-client
          url: "/meetings/{{ .input.meetingId }}/recordings"
          method: GET
          error_on_status: false
      - name: shape
        type: step.jq
        config:
          input_from: steps.call
          expression: |
            if .status_code < 400 then {ok: true, data: .body}
            elif .status_code == 401 then {ok: false, error: {code: "not_authenticated", message: "Zoom OAuth token is missing or invalid; run setup flow."}}
            elif .status_code == 403 then {ok: false, error: {code: "scope_missing", message: (.body.message // "required OAuth scope is missing")}}
            elif .status_code == 404 then {ok: false, error: {code: "not_found", message: (.body.message // "meeting or recordings not found")}}
            elif .status_code == 429 then {ok: false, error: {code: "rate_limited", message: "Zoom rate limit exceeded", retry_after: ((.headers["Retry-After"] // "60") | tonumber)}}
            else {ok: false, error: {code: "zoom_error", message: (.body.message // ("HTTP " + (.status_code | tostring)))}}
            end
      - type: step.pipeline_output
        config:
          source: steps.shape.result

  # get_transcript: v1 simplification — try direct /meetings/{id}/transcript only.
  # If Zoom returns 404, map to `transcript_unavailable`. A future version can
  # fall back to scanning /meetings/{id}/recordings for a TRANSCRIPT file and
  # downloading it via zoom-download-client.
  get_transcript:
    trigger:
      type: mcp.tool
      config:
        server: mcp-server
        registry: mcp-tool-registry
        name: get_transcript
        description: "Fetch the VTT transcript for a completed meeting, if one exists."
        input_schema:
          type: object
          properties:
            meetingId: { type: string, description: "The meeting ID or UUID." }
          required: [meetingId]
    steps:
      - name: call
        type: step.http_call
        config:
          client: zoom-client
          url: "/meetings/{{ .input.meetingId }}/transcript"
          method: GET
          error_on_status: false
      - name: shape
        type: step.jq
        config:
          input_from: steps.call
          expression: |
            if .status_code < 400 then {ok: true, data: {transcript: (.body | if type == "string" then . else tostring end)}}
            elif .status_code == 401 then {ok: false, error: {code: "not_authenticated", message: "Zoom OAuth token is missing or invalid; run setup flow."}}
            elif .status_code == 403 then {ok: false, error: {code: "scope_missing", message: ((.body | if type == "object" then .message else null end) // "required OAuth scope is missing")}}
            elif .status_code == 404 then {ok: false, error: {code: "transcript_unavailable", message: "No transcript is available for this meeting."}}
            elif .status_code == 429 then {ok: false, error: {code: "rate_limited", message: "Zoom rate limit exceeded", retry_after: ((.headers["Retry-After"] // "60") | tonumber)}}
            else {ok: false, error: {code: "zoom_error", message: ((.body | if type == "object" then .message else null end) // ("HTTP " + (.status_code | tostring)))}}
            end
      - type: step.pipeline_output
        config:
          source: steps.shape.result

  get_meeting_summary:
    trigger:
      type: mcp.tool
      config:
        server: mcp-server
        registry: mcp-tool-registry
        name: get_meeting_summary
        description: "Get the AI Companion summary for a meeting. Returns ai_companion_unavailable when no summary exists."
        input_schema:
          type: object
          properties:
            meetingId: { type: string, description: "The meeting ID or UUID." }
          required: [meetingId]
    steps:
      - name: call
        type: step.http_call
        config:
          client: zoom-client
